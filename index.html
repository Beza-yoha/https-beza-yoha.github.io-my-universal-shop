<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storefront | Universal Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --accent: #0071e3; --bg: #f5f5f7; }
        body { background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, sans-serif; color: #1d1d1f; margin: 0; }
        .shop-header { background: white; padding: 60px 20px; text-align: center; border-bottom: 1px solid #d2d2d7; }
        .logo-img { width: 100px; height: 100px; border-radius: 22%; object-fit: cover; margin-bottom: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .product-card { border: none; border-radius: 20px; background: white; transition: 0.3s; padding: 30px; text-align: center; height: 100%; }
        .product-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.08); }
        .btn-buy { background: var(--accent); color: white; border-radius: 980px; padding: 12px; font-weight: 500; border: none; width: 100%; mt: 15px; }
        .price-tag { font-size: 1.5rem; font-weight: 600; color: #1d1d1f; }
    </style>
</head>
<body>
<a href="dashboard.html" style="position: fixed; top: 10px; right: 10px; background: black; color: white; padding: 10px; border-radius: 5px; text-decoration: none; z-index: 9999;">
   Open Dashboard ⚙️
</a>
<div class="shop-header">
        <div id="logo-place"></div>
        <h1 id="shop-name" class="fw-bold text-dark">Loading Store...</h1>
        <p class="text-muted">Premium Quality Guaranteed</p>
    </div>

    <div class="container my-5">
        <div id="product-list" class="row g-4 justify-content-center">
            </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
