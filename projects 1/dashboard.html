<!DOCTYPE html>
<html lang="en">
<head>
    <title>Merchant Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; min-height: 100vh; display: flex; align-items: center; padding: 20px; }
        .setup-card { background: #1c1c1e; border: 1px solid #38383a; border-radius: 28px; padding: 40px; width: 100%; max-width: 450px; }
        input { background: #2c2c2e !important; border: 1px solid #38383a !important; color: #fff !important; border-radius: 12px !important; padding: 12px !important; margin-bottom: 15px; }
        .btn-primary { background: #0a84ff; border: none; border-radius: 12px; padding: 14px; font-weight: 600; width: 100%; }
    </style>
</head>
<body>
    <div class="setup-card mx-auto">
        <h2 class="fw-bold mb-4">Start Your Business</h2>
        <input type="text" id="shop-slug" placeholder="Store URL ID (e.g. mikes-shoes)">
        <input type="text" id="shop-title" placeholder="Business Name">
        <label class="small text-secondary mb-2">Upload Store Logo</label>
        <input type="file" id="shop-logo" class="form-control" accept="image/*">
        
        <div class="row g-2">
            <div class="col-8"><input type="text" id="item-name" placeholder="First Product"></div>
            <div class="col-4"><input type="number" id="item-price" placeholder="$"></div>
        </div>
        <button class="btn-primary" onclick="launchPlatform()">Create My Shop 🚀</button>
    </div>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
