<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storefront | Powered by UniversalShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --accent: #0071e3; --bg: #f5f5f7; }
        body { background: var(--bg); font-family: -apple-system, sans-serif; color: #1d1d1f; }
        .nav-glass { background: rgba(255,255,255,0.8); backdrop-filter: saturate(180%) blur(20px); sticky: top; border-bottom: 1px solid #d2d2d7; }
        .shop-banner { padding: 80px 20px; text-align: center; background: white; }
        .logo-circle { width: 120px; height: 120px; border-radius: 25%; object-fit: cover; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .card-product { border: none; border-radius: 20px; background: white; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 30px; height: 100%; }
        .card-product:hover { transform: scale(1.03); box-shadow: 0 30px 60px rgba(0,0,0,0.12); }
        .price { font-size: 1.4rem; font-weight: 600; margin: 15px 0; }
        .btn-apple { background: var(--accent); color: white; border-radius: 980px; padding: 12px 30px; font-weight: 500; border: none; width: 100%; }
        .btn-apple:hover { background: #0077ed; opacity: 0.9; }
        
    /* Professional Modern Theme */
    :root { 
        --accent: #0071e3; 
        --bg: #f5f5f7; 
        --card: #ffffff;
    }

    body { 
        background-color: var(--bg); 
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
        margin: 0;
        color: #1d1d1f;
    }

    /* The Glass Header */
    .shop-header { 
        background: white; 
        padding: 60px 20px; 
        text-align: center; 
        border-bottom: 1px solid #d2d2d7;
        margin-bottom: 40px;
    }

    .logo-img { 
        width: 100px; 
        height: 100px; 
        border-radius: 22%; 
        object-fit: cover; 
        margin-bottom: 15px; 
        box-shadow: 0 8px 20px rgba(0,0,0,0.1); 
    }

    /* Product Grid */
    #product-list {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 30px;
        padding: 20px;
        max-width: 1200px;
        margin: 0 auto;
    }

    .product-card { 
        background: var(--card); 
        border-radius: 20px; 
        padding: 30px; 
        text-align: center;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        border: 1px solid rgba(0,0,0,0.05);
    }

    .product-card:hover { 
        transform: translateY(-10px); 
        box-shadow: 0 20px 40px rgba(0,0,0,0.08); 
    }

    .price-tag { 
        font-size: 1.5rem; 
        font-weight: 600; 
        color: #1d1d1f; 
        margin: 10px 0;
    }

    /* Shopify-style Button */
    .btn-buy { 
        background: var(--accent); 
        color: white; 
        border: none;
        border-radius: 980px; 
        padding: 12px 25px; 
        font-size: 1rem;
        font-weight: 500; 
        cursor: pointer;
        width: 100%;
        transition: opacity 0.2s;
    }

    .btn-buy:hover { opacity: 0.8; }

    /* Responsive for Mobile */
    @media (max-width: 600px) {
        .shop-header { padding: 40px 10px; }
        #product-list { grid-template-columns: 1fr; }
    }
    </style>
</head>
<body>

    <nav class="nav-glass sticky-top py-3">
        <div class="container d-flex justify-content-between align-items-center">
            <span class="fw-bold">UniversalShop</span>
            <a href="dashboard.html" class="btn btn-sm btn-outline-dark rounded-pill">Create a Shop</a>
        </div>
    </nav>

    <header class="shop-banner">
        <div id="logo-container"></div>
        <h1 id="display-shop-name" class="display-5 fw-bold">Opening Store...</h1>
        <p class="text-muted">Verified Merchant</p>
    </header>

    <main class="container my-5">
        <div id="display-products" class="row g-4 justify-content-center">
            </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
