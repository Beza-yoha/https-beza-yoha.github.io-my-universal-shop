<!DOCTYPE html>
<html>
<head>
    <title>Merchant Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #000; color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .glass-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 25px; padding: 40px; width: 100%; max-width: 450px; border: 1px solid rgba(255,255,255,0.2); }
        input { background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.2) !important; color: white !important; margin-bottom: 15px; border-radius: 10px !important; }
        .btn-launch { background: white; color: black; font-weight: bold; border-radius: 10px; width: 100%; padding: 12px; border: none; }
    </style>
</head>
<body>
    <label>Product Price ($)</label>
<input type="number" id="p-price" class="form-control" placeholder="e.g. 15.00">
    <div class="glass-card">
        <h2 class="fw-bold mb-4 text-center">Create Your Brand</h2>
        <input type="text" id="shop-id" class="form-control" placeholder="Unique Shop ID (e.g. beza-coffee)">
        <input type="text" id="biz-name" class="form-control" placeholder="Business Name">
        <label class="small text-secondary">Upload Logo</label>
        <input type="file" id="logo-file" class="form-control" accept="image/*">
        <input type="text" id="p-name" class="form-control" placeholder="First Product Name">
        <input type="number" id="p-price" class="form-control" placeholder="Price ($)">
        <button class="btn-launch" onclick="handleShopCreation()">Launch Website 🚀</button>
     <button onclick="handleShopCreation()">Launch Store 🚀</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
