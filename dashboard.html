<!DOCTYPE html>
<html>
<head>
    <title>Merchant Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: white; padding: 50px; font-family: sans-serif; }
        .glass-card { background: rgba(255,255,255,0.1); padding: 30px; border-radius: 20px; max-width: 500px; margin: auto; backdrop-filter: blur(10px); }
        .form-control { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); margin-bottom: 15px; }
        .btn-launch { background: #3b82f6; color: white; width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="glass-card">
        <h2 class="text-center">Create Your Store</h2>
        
        <label>Shop URL ID</label>
        <input type="text" id="shop-id" class="form-control" placeholder="e.g. my-cool-shop">
        
        <label>Business Name</label>
        <input type="text" id="biz-name" class="form-control" placeholder="e.g. Beza Coffee">
        
        <label>Featured Product</label>
        <input type="text" id="p-name" class="form-control" placeholder="Product Name">
        
        <label>Product Price ($)</label>
        <input type="number" id="p-price" class="form-control" placeholder="0.00">
        
        <button class="btn-launch" onclick="handleShopCreation()">Launch Store 🚀</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <script src="app.js"></script>
</body>
</html>
